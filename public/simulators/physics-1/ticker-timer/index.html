<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticker Timer Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .timer-box {
            width: 300px;
            height: 150px;
            background: #ecf0f1;
            margin: 0 auto 20px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed #bdc3c7;
            font-size: 24px;
            font-weight: bold;
            color: #7f8c8d;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>เครื่องเคาะสัญญาณเวลา</h1>
        <div class="timer-box">
            [Simulator พื้นที่จำลอง]
        </div>
        <p>นี่คือไฟล์ HTML ตัวอย่างที่คุณสามารถนำมาวางในโฟลเดอร์ `public/simulators` ได้</p>
        <button onclick="alert('กำลังทำงาน...')">เริ่มการทดลอง</button>
    </div>
</body>
</html>
